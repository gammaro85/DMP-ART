<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>{% block title %}DMP ART{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/dmp-art-favicon (Niestandardowe).png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Prevent flash of wrong theme -->
    <script>
        (function() {
            const saved = localStorage.getItem('dmp-art-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = theme === 'dark' ? '#121212' : '#ffffff';
        })();
    </script>
</head>
<body data-page="index" style="transition: none !important; animation: none !important;">
    <!-- Fixed Header Navigation -->
    <header class="fixed-header">
        <nav class="header-nav">
            <button class="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="history-btn" aria-label="View session history" title="View archived and active sessions">
                <i class="fas fa-history"></i> History
            </button>
            <div class="nav-links">
                <a href="/" class="nav-item" data-page="index">Home</a>
                <span class="nav-item disabled" data-page="review"
                      title="Upload and process a document first to access review">Review</span>
                <a href="/settings" class="nav-item" data-page="settings">Settings</a>
                <a href="/documentation" class="nav-item" data-page="documentation">Documentation</a>
            </div>
        </nav>
    </header>
    <div class="container index-container">
        <!-- Flexible spacer before content -->
        <div class="flex-spacer"></div>

        <div class="main-logo-section">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/dmp-art-logo-main-light.png') }}"
                     alt="DMP ART Logo"
                     class="logo light-logo"
                     loading="lazy">
                 <img src="{{ url_for('static', filename='images/dmp-art-logo-main-dark-gold.png') }}"
                     alt="DMP ART Logo"
                     class="logo dark-logo"
                     loading="lazy">
            </div>
            <div class="subtitle">
                <div class="subtitle-line"><span class="first-letter">D</span>ata</div>
                <div class="subtitle-line"><span class="first-letter">M</span>anagement</div>
                <div class="subtitle-line"><span class="first-letter">P</span>lan</div>
                <div class="subtitle-line"><span class="first-letter">A</span>ssessment and</div>
                <div class="subtitle-line"><span class="first-letter">R</span>esponse</div>
                <div class="subtitle-line"><span class="first-letter">T</span>ool</div>
            </div>
        </div>

        <!-- Recent Sessions (populated by JavaScript) -->
        <div id="recent-sessions-container" class="recent-sessions-container hidden">
            <h3 class="recent-sessions-title">
                <i class="fas fa-history"></i>
                Recent Reviews
            </h3>
            <div id="recent-sessions-list" class="recent-sessions-list">
                <!-- Sessions will be populated here by JavaScript -->
            </div>
        </div>

        <!-- Drop area for file upload -->
        <div id="drop-area" class="upload-area">
            <div class="upload-text">Load or drag and drop your DMP file here</div>
            <div class="upload-hint">Accepted file types: DOCX and PDF</div>
            <input id="file-input" type="file" accept=".pdf,.docx" class="file-input" />
            <div id="file-info" class="file-info hidden">
                <span id="file-name" class="file-name"></span>
            </div>

            <div class="upload-actions gap-2xl">
                <button id="upload-btn" class="primary-btn" disabled>Process File</button>
                <button id="clear-btn" class="secondary-btn" disabled>Clear</button>
            </div>
        </div>

        <!-- Flexible spacer after content -->
        <div class="flex-spacer"></div>
    </div>

    <!-- History Modal -->
    <div id="history-modal">
        <div class="history-modal-content">
            <div class="history-modal-header">
                <h2><i class="fas fa-history"></i> Session History</h2>
                <button class="history-modal-close" aria-label="Close">&times;</button>
            </div>
            <div class="history-modal-body">
                <!-- Active Sessions -->
                <div class="history-section">
                    <h3><i class="fas fa-clock"></i> Active Sessions</h3>
                    <div id="active-sessions-list"></div>
                </div>

                <!-- Archived Sessions -->
                <div class="history-section">
                    <h3><i class="fas fa-archive"></i> Archived Sessions</h3>
                    <div id="archived-sessions-list"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer site-footer--relative">
        <span>DMP ART &copy; 2025 — <a href="https://github.com/gammaro85/DMP-ART" target="_blank" rel="noopener" class="footer-link">MIT License</a></span>
    </footer>

    <!-- Load dark mode script before other scripts -->
    <script src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
