                  - textbox [ref=e140]: "Opis metadanych niepełny. README powinien zawierać: opis metodologii badawczej, wyjaśnienie wszystkich zmiennych z jednostkami i zakresami wartości, procedury zbierania danych, strukturę plików i folderów, wymagania oprogramowania, znane ograniczenia lub problemy jakościowe, informacje kontaktowe."
