                    - generic [ref=e164]: 
                - generic [ref=e165]:
                  - textbox [ref=e166]: "Należy konkretnie wymienić: dyski laboratoryjne (czyje?), serwery sieciowe (jakie?), chmura (jaka?), dyski zewnętrzne (gdzie przechowywane?). Nie należy podawać DropBox (dane mogą zostać usunięte bez pytania, serwery poza UE)."
