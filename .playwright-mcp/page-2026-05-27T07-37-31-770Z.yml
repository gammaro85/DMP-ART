                - generic [ref=e135]:
                  - textbox [ref=e136]: "Brak opisu struktury katalogów i nazewnictwa plików. Należy dodać na początku jak dane będą katalogowane, czyli że będzie stworzona struktura folderów, a nazwy poszczególnych plików będą usystematyzowane i będą pozwalały na szybką identyfikację: \"Folder structure: /raw_data, /processed_data, /scripts, /results. File names: YYYY-MM-DD_experimentID_sampleID.csv\""
