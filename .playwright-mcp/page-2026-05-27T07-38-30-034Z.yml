              - heading "5.1 — How and when will data be shared? Are there possible restrictions to data sharing or embargo reasons?" [level=4] [ref=e400]
              - generic [ref=e401]:
                - generic [ref=e402]:
                  - textbox [ref=e403]: Embargo wymaga konkretnego uzasadnienia dlaczego dane nie mogą być udostępnione od razu (analiza w toku, przygotowanie publikacji, proces patentowy, zobowiązania wobec partnerów) oraz konkretnej daty końca embargo ("31.12.2026", nie "po zakończeniu projektu").
