                    - generic [ref=e355]: 
                - generic [ref=e356]:
                  - textbox [ref=e357]: "Należy konkretnie wymienić: dyski laboratoryjne (czyje?), serwery sieciowe (jakie?), chmura (jaka?), dyski zewnętrzne (gdzie przechowywane?). Nie należy podawać DropBox (dane mogą zostać usunięte bez pytania, serwery poza UE)."
