              - heading "2.1 — What metadata and documentation (for example methodology or data collection and way of organising data) will accompany data?" [level=4] [ref=e324]
              - generic [ref=e325]:
                - generic [ref=e326]:
                  - textbox [ref=e327]: "Brak opisu struktury katalogów i nazewnictwa plików. Należy dodać na początku jak dane będą katalogowane, czyli że będzie stworzona struktura folderów, a nazwy poszczególnych plików będą usystematyzowane i będą pozwalały na szybką identyfikację: \"Folder structure: /raw_data, /processed_data, /scripts, /results. File names: YYYY-MM-DD_experimentID_sampleID.csv\""
