                - generic [ref=e352]:
                  - textbox [ref=e353]: Brak opisu kopii zapasowych. Punkt 3.1 wymaga opisu przechowywania w trakcie projektu oraz strategii backup (nośniki, częstotliwość, lokalizacja).
